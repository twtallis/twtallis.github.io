<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Supabase Messaging Board</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #messages { border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: auto; }
    .message { padding: 5px; border-bottom: 1px solid #eee; }
    input, button { padding: 8px; margin-top: 5px; }
  </style>
</head>
<body>
  <h1> Messaging Board</h1>
  <div id="messages"></div>
  <input type="text" id="username" placeholder="Your name" />
  <input type="text" id="message" placeholder="Type a message" />
  <button id="sendBtn">Send</button>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    //1Jswan??
    const SUPABASE_URL = "https://lkgjwwokdjqbjlxjhoze.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxrZ2p3d29rZGpxYmpseGpob3plIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MjUyODQsImV4cCI6MjA5MjAwMTI4NH0.tCTXXkAkTMXK_mFX1ZJlFwqfweLr0ISj2r2ecbWhpnA";

    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const messagesDiv = document.getElementById("messages");
    const usernameInput = document.getElementById("username");
    const messageInput = document.getElementById("message");
    const sendBtn = document.getElementById("sendBtn");

    function addMessage(username, text) {
      const div = document.createElement("div");
      div.className = "message";
      div.textContent = `${username}: ${text}`;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function loadMessages() {
      try {
        const { data, error } = await supabase
          .from("messages")
          .select("*")
          .order("created_at", { ascending: true });

        if (error) throw error;
        messagesDiv.innerHTML = "";
        data.forEach(msg => addMessage(msg.username, msg.text));
      } catch (err) {
        console.error("Error loading messages:", err.message);
      }
    }

    // Listen for new messages in real-time
    function subscribeToMessages() {
      supabase
        .channel("public:messages")
        .on(
          "postgres_changes",
          { event: "INSERT", schema: "public", table: "messages" },
          payload => {
            const msg = payload.new;
            addMessage(msg.username, msg.text);
          }
        )
        .subscribe();
    }

    // Send a new message
    async function sendMessage() {
      const username = usernameInput.value.trim();
      const text = messageInput.value.trim();
      if (!username || !text) return alert("Please enter both name and message.");

      try {
        const { error } = await supabase
          .from("messages")
          .insert([{ username, text }]);
        if (error) throw error;
        messageInput.value = "";
      } catch (err) {
        console.error("Error sending message:", err.message);
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    messageInput.addEventListener("keypress", e => {
      if (e.key === "Enter") sendMessage();
    });

    // Initialize
    loadMessages();
    subscribeToMessages();
  </script>
</body>
</html>
